<!DOCTYPE html>
<html lang="en">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>River Row</title>
<script src="./aigram-bridge.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#22324a;
    --gold:#ffcf4d;
    --teal:#2ab7a9;
    --teal-deep:#16877c;
    --cream:#fff2dc;
    --font:"Fredoka","PingFang SC",system-ui,-apple-system,sans-serif;
  }
  * { box-sizing:border-box; }
  html, body {
    margin:0; height:100%; overflow:hidden;
    background:#9bd2dc;
    font-family:var(--font);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #wrap { position:fixed; inset:0; overflow:hidden; }
  #c { display:block; width:100%; height:100%; touch-action:none; }
  .hud { position:fixed; pointer-events:none; z-index:5; }

  /* ── Score — top centre, big bold number, opacity gates on play state ── */
  #score {
    top:max(28px,calc(env(safe-area-inset-top) + 14px)); left:50%; transform:translateX(-50%);
    font-weight:700; color:#fff; font-size:64px; line-height:1;
    font-variant-numeric:tabular-nums; letter-spacing:.01em;
    text-shadow:0 2px 1px rgba(34,50,74,.32), 0 6px 22px rgba(20,40,90,.5);
    opacity:0; transition:opacity .3s ease;
  }
  #score.show { opacity:1; }
  #score.bump { animation:rr-bump .3s cubic-bezier(.3,1.5,.5,1); }
  @keyframes rr-bump {
    0%   { transform:translateX(-50%) scale(1.18); }
    100% { transform:translateX(-50%) scale(1); }
  }

  /* ── Combo chip — frosted pill below score, shows during chain ── */
  #combo {
    top:calc(max(28px,calc(env(safe-area-inset-top) + 14px)) + 72px); left:50%;
    transform:translateX(-50%) translateY(4px);
    font-weight:600; font-size:14px; letter-spacing:.10em; line-height:1; color:#16877c;
    background:linear-gradient(145deg, rgba(255,255,255,.85), rgba(255,255,255,.7));
    -webkit-backdrop-filter:saturate(160%) blur(14px); backdrop-filter:saturate(160%) blur(14px);
    border:1px solid rgba(255,255,255,.78); box-shadow:0 6px 18px rgba(22,40,82,.18);
    padding:6px 12px; border-radius:999px;
    opacity:0; transition:opacity .22s ease, transform .22s ease;
  }
  #combo.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #combo.pop { animation:rr-combopop .34s cubic-bezier(.3,1.6,.5,1); }
  @keyframes rr-combopop {
    from { transform:translateX(-50%) scale(.6); }
    to   { transform:translateX(-50%) scale(1); }
  }

  /* ── Wordmark + steering hint shown at preroll ── */
  #title {
    top:max(70px,calc(env(safe-area-inset-top) + 50px)); left:50%; transform:translateX(-50%);
    width:max-content; max-width:94vw; text-align:center; line-height:1;
    transition:opacity .35s ease, transform .35s ease;
  }
  #title .brand {
    display:block; font-weight:700; font-size:68px;
    background:linear-gradient(170deg, #fff 4%, #c4f0e8 46%, var(--teal) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 12px rgba(22,135,124,.42)) drop-shadow(0 1px 0 rgba(255,255,255,.5));
    padding:.06em 0 .14em;
  }
  #title .sub {
    display:block; font-weight:500; font-size:13px; letter-spacing:.32em;
    color:rgba(34,50,74,.7); margin-top:6px; text-transform:uppercase;
  }
  #title.hidden { opacity:0; transform:translate(-50%,-12px); }

  /* ── Swipe hint — ghost-finger sweep arc, only during preroll ── */
  #hint {
    bottom:calc(20% + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:14px;
    opacity:0; transition:opacity .4s ease;
  }
  #hint.show { opacity:1; }
  #hint .finger {
    position:relative; width:62px; height:62px;
    animation:rr-sweep 1.8s ease-in-out infinite;
  }
  #hint .finger svg { width:100%; height:100%; display:block; fill:rgba(255,255,255,.96);
    filter:drop-shadow(0 0 6px rgba(22,135,124,.55)) drop-shadow(0 2px 4px rgba(0,0,0,.22)); }
  #hint .label {
    font-weight:600; font-size:16px; letter-spacing:.04em;
    color:#fff; text-shadow:0 2px 8px rgba(22,40,82,.6);
  }
  @keyframes rr-sweep {
    0%,100% { transform:translateX(-26px) rotate(-12deg); }
    50%     { transform:translateX(26px) rotate(12deg); }
  }

  /* ── Death overlay ── */
  #over {
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(22,32,56,.42); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    z-index:30; padding:24px; pointer-events:auto;
  }
  #over.show { display:flex; animation:rr-fade .25s ease; }
  @keyframes rr-fade { from{opacity:0;} to{opacity:1;} }
  #over .card {
    text-align:center; max-width:330px; width:100%;
    background:linear-gradient(150deg, rgba(255,255,255,.9), rgba(255,255,255,.72));
    -webkit-backdrop-filter:saturate(160%) blur(18px); backdrop-filter:saturate(160%) blur(18px);
    color:var(--ink); border:1px solid rgba(255,255,255,.78); border-radius:28px;
    box-shadow:0 24px 60px rgba(22,40,82,.3), inset 0 1px 0 rgba(255,255,255,.9);
    padding:30px 26px 26px; display:flex; flex-direction:column; align-items:center;
    animation:rr-rise .34s cubic-bezier(.2,1.1,.4,1);
  }
  @keyframes rr-rise { from{transform:translateY(20px) scale(.96); opacity:0;} to{transform:none; opacity:1;} }
  #over h1 {
    font-weight:700; font-size:clamp(24px,7vw,30px); color:var(--ink);
    margin:0 0 16px; letter-spacing:.005em; line-height:1.1;
  }
  #over .rows { display:flex; gap:12px; justify-content:center; width:100%; }
  #over .stat {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.7);
    border-radius:18px; padding:12px 8px;
  }
  #over .stat .k {
    font-weight:600; font-size:11px; letter-spacing:.16em; color:rgba(34,50,74,.6);
    text-transform:uppercase;
  }
  #over .stat .v {
    font-weight:700; font-size:38px; color:var(--ink);
    font-variant-numeric:tabular-nums; line-height:1;
  }
  #over .stat.best .v {
    background:linear-gradient(150deg, var(--gold), #f5a623);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #over .btns { display:flex; flex-direction:column; gap:10px; width:100%; margin-top:20px; }
  #again {
    pointer-events:auto; width:100%; min-height:48px; border-radius:999px;
    font-family:var(--font); font-weight:600; font-size:20px; letter-spacing:.04em; cursor:pointer;
    color:#fff; border:none;
    background:linear-gradient(150deg, #4dd4c3, var(--teal) 50%, var(--teal-deep));
    box-shadow:0 10px 24px rgba(22,135,124,.46), inset 0 1px 0 rgba(255,255,255,.5);
    text-shadow:0 1px 2px rgba(8,82,76,.5);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  #again:active { transform:translateY(2px); box-shadow:0 5px 14px rgba(22,135,124,.42); }

  /* ── Champion pill — top-right, tap to open full leaderboard ── */
  #lb {
    position:fixed; top:max(20px,calc(env(safe-area-inset-top) + 8px)); right:12px;
    z-index:6; pointer-events:auto; display:none;
  }
  #lb.show { display:block; }
  .lbrow {
    display:flex; align-items:center; gap:7px;
    background:linear-gradient(145deg, rgba(255,255,255,.78), rgba(255,255,255,.6));
    -webkit-backdrop-filter:saturate(165%) blur(18px); backdrop-filter:saturate(165%) blur(18px);
    border:1px solid rgba(255,255,255,.78); box-shadow:0 8px 20px rgba(22,40,82,.2);
    border-radius:999px; padding:5px 14px 5px 6px;
    font-weight:600; font-size:15px; color:var(--ink); line-height:1; letter-spacing:.01em;
    cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform .12s ease;
  }
  .lbrow:active { transform:scale(.96); }
  .lbrow .crown { width:16px; height:16px; flex:0 0 auto; display:block; }
  .lbrow .crown path { fill:var(--gold); stroke:rgba(180,120,20,.55); stroke-width:1.2; stroke-linejoin:round; }
  .lbrow .av, .lbrow .avf {
    width:25px; height:25px; border-radius:50%; border:1.5px solid rgba(255,255,255,.9);
    box-shadow:0 1px 4px rgba(22,40,82,.3);
    flex:0 0 auto; display:block; object-fit:cover;
  }
  .lbrow .avf {
    background:linear-gradient(150deg, #4dd4c3, var(--teal)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600;
  }
  .lbrow .nm { max-width:66px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lbrow .sc { color:var(--teal-deep); font-weight:700; font-variant-numeric:tabular-nums; }
  .lbrow.me .nm { color:var(--teal-deep); }

  /* ── Full leaderboard overlay ── */
  #lbFull {
    position:fixed; inset:0; display:none; z-index:40; padding:22px;
    align-items:center; justify-content:center;
    background:rgba(22,32,56,.42); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    pointer-events:auto;
  }
  #lbFull.show { display:flex; animation:rr-fade .25s ease; }
  #lbFull .lcard {
    background:linear-gradient(150deg, rgba(255,255,255,.9), rgba(255,255,255,.72));
    -webkit-backdrop-filter:saturate(160%) blur(18px); backdrop-filter:saturate(160%) blur(18px);
    border:1px solid rgba(255,255,255,.78); border-radius:26px;
    width:100%; max-width:380px; max-height:84vh;
    display:flex; flex-direction:column; padding:22px 18px 18px;
    box-shadow:0 24px 60px rgba(22,40,82,.3), inset 0 1px 0 rgba(255,255,255,.9);
    animation:rr-rise .34s cubic-bezier(.2,1.1,.4,1);
  }
  #lbFull h2 {
    font-weight:700; font-size:24px; color:var(--ink);
    margin:0 0 6px; text-align:center; letter-spacing:.01em;
  }
  #lbFull .lsub {
    text-align:center; font-weight:500; font-size:12px; letter-spacing:.18em;
    color:rgba(34,50,74,.6); text-transform:uppercase; margin:0 0 16px;
  }
  #lblist {
    display:flex; flex-direction:column; gap:8px;
    overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px;
  }
  .lfrow {
    display:flex; align-items:center; gap:11px;
    border:1px solid rgba(255,255,255,.7); border-radius:16px; background:rgba(255,255,255,.55);
    padding:9px 14px 9px 11px; cursor:pointer;
    font-weight:600; font-size:17px; color:var(--ink); line-height:1; letter-spacing:.01em;
    -webkit-tap-highlight-color:transparent; transition:transform .12s ease, background .2s ease;
  }
  .lfrow:active { transform:scale(.985); background:rgba(255,255,255,.7); }
  .lfrow .rk { font-size:15px; min-width:30px; text-align:center; color:rgba(34,50,74,.55); font-weight:700; }
  .lfrow .av, .lfrow .avf {
    width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(255,255,255,.9);
    box-shadow:0 1px 5px rgba(22,40,82,.28);
    flex:0 0 auto; display:block; object-fit:cover;
  }
  .lfrow .avf {
    background:linear-gradient(150deg, #4dd4c3, var(--teal)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600;
  }
  .lfrow .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lfrow .sc { color:var(--teal-deep); font-weight:700; font-variant-numeric:tabular-nums; }
  .lfrow.me { background:linear-gradient(150deg, rgba(77,212,195,.30), rgba(42,183,169,.18)); border-color:rgba(22,135,124,.45); }
  .lfrow.me .nm { color:var(--teal-deep); }
  .lfrow.me .rk { color:var(--teal-deep); }
  #lbClose {
    margin-top:16px; align-self:stretch; min-height:46px; border:none; border-radius:999px;
    background:rgba(255,255,255,.6); border:1px solid rgba(255,255,255,.78); color:var(--ink);
    font-family:var(--font); font-weight:600; font-size:17px; letter-spacing:.04em;
    cursor:pointer; -webkit-tap-highlight-color:transparent; box-shadow:0 4px 12px rgba(22,40,82,.14);
    transition:transform .12s ease, background .2s ease;
  }
  #lbClose:active { transform:translateY(2px); background:rgba(255,255,255,.75); }

  /* When death overlay is up, show a leaderboard button inside it */
  #over .btn-ghost {
    pointer-events:auto; width:100%; min-height:46px; border-radius:999px;
    font-family:var(--font); font-weight:600; letter-spacing:.04em; cursor:pointer;
    font-size:17px; color:var(--ink); border:1px solid rgba(255,255,255,.78);
    background:rgba(255,255,255,.6); box-shadow:0 4px 12px rgba(22,40,82,.14);
    transition:transform .12s ease, background .2s ease;
  }
  #over .btn-ghost:active { transform:translateY(2px); background:rgba(255,255,255,.75); }

  @media (prefers-reduced-motion: reduce) {
    #hint .finger { animation:none; }
    #over.show, #over .card { animation:none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="score" class="hud">0</div>
  <div id="combo" class="hud"></div>
  <div id="title" class="hud">
    <span class="brand">River Row</span>
    <span class="sub">drag to steer</span>
  </div>
  <div id="hint" class="hud">
    <div class="finger">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.92-1.38z"/></svg>
    </div>
    <div class="label">Drag left &amp; right to steer</div>
  </div>
  <div id="lb"></div>
</div>

<div id="lbFull">
  <div class="lcard">
    <h2>River Champions</h2>
    <p class="lsub">Longest rowers</p>
    <div id="lblist"></div>
    <button id="lbClose">Close</button>
  </div>
</div>

<div id="over">
  <div class="card">
    <h1>Capsized</h1>
    <div class="rows">
      <div class="stat"><span class="k">Reached</span><span class="v" id="finalScore">0</span></div>
      <div class="stat best"><span class="k">Best</span><span class="v" id="finalBest">0</span></div>
    </div>
    <div class="btns">
      <button id="again">Row again</button>
      <button class="btn-ghost" id="overRank">View ranking</button>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import { startGame } from './game.js?v=23';

const $ = (s) => document.querySelector(s);
const scoreEl = $('#score');
const comboEl = $('#combo');
const titleEl = $('#title');
const hintEl  = $('#hint');
const overEl  = $('#over');
const finalScoreEl = $('#finalScore');
const finalBestEl  = $('#finalBest');

let lastScore = 0;
let scoreBumpT = null;
let comboPopT = null;

const hud = {
  setScore(n) {
    scoreEl.textContent = String(n);
    if (n > lastScore + 4) {
      scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
      clearTimeout(scoreBumpT); scoreBumpT = setTimeout(() => scoreEl.classList.remove('bump'), 320);
    }
    lastScore = n;
  },
  setCombo(n) {
    if (n >= 2) {
      comboEl.textContent = '×' + n + '  CHAIN';
      comboEl.classList.add('show', 'pop');
      clearTimeout(comboPopT);
      comboPopT = setTimeout(() => comboEl.classList.remove('pop'), 340);
    } else {
      comboEl.classList.remove('show');
    }
  },
  setBest(n)  { finalBestEl.textContent = String(n); },
  setPhase(p) {
    if (p === 'preroll') {
      scoreEl.classList.remove('show');
      comboEl.classList.remove('show');
      titleEl.classList.remove('hidden');
      hintEl.classList.add('show');
      overEl.classList.remove('show');
      lastScore = 0;
    } else if (p === 'play') {
      scoreEl.classList.add('show');
      titleEl.classList.add('hidden');
      hintEl.classList.remove('show');
      overEl.classList.remove('show');
    } else if (p === 'dead') {
      overEl.classList.add('show');
      comboEl.classList.remove('show');
    }
  },
  setDeath({ score, best }) {
    finalScoreEl.textContent = String(score);
    finalBestEl.textContent  = String(best);
    overEl.classList.add('show');
  },
};

// ── Leaderboard wiring (Aigram rank API + champion pill + full overlay) ────
const lbEl       = $('#lb');
const lbFullEl   = $('#lbFull');
const lblistEl   = $('#lblist');
const lbCloseEl  = $('#lbClose');
const overRankEl = $('#overRank');
let lbData = { rows: [], meId: '' };

function lbInitial(name) {
  const d = document.createElement('span');
  d.className = 'avf';
  d.textContent = ((name || '?').trim().charAt(0) || '?').toUpperCase();
  return d;
}
function lbAvatar(r) {
  if (r.head_url) {
    const img = document.createElement('img');
    img.className = 'av'; img.src = r.head_url; img.alt = ''; img.draggable = false;
    img.onerror = () => img.replaceWith(lbInitial(r.user_name));
    return img;
  }
  return lbInitial(r.user_name);
}
function lbChampionPill(r, isMe) {
  const row = document.createElement('div');
  row.className = 'lbrow' + (isMe ? ' me' : '');
  row.innerHTML = '<svg class="crown" viewBox="0 0 24 24"><path d="M3 18 L2 7 L8 12 L12 4 L16 12 L22 7 L21 18 Z"/></svg>';
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  let name = (r.user_name || '?').trim();
  if (name.length > 8) name = name.slice(0, 8) + '…';
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : name;
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  row.addEventListener('click', openLbFull);
  return row;
}
function lbFullRow(r, isMe) {
  const row = document.createElement('div');
  row.className = 'lfrow' + (isMe ? ' me' : '');
  const rk = document.createElement('span');
  rk.className = 'rk'; rk.textContent = '#' + r.rank;
  row.appendChild(rk);
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : (r.user_name || '?');
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  if (!isMe && r.user_id) {
    row.addEventListener('click', () => window.Aigram && window.Aigram.openAigramProfile(r.user_id));
  }
  return row;
}
function openLbFull() {
  lblistEl.innerHTML = '';
  for (const r of lbData.rows) lblistEl.appendChild(lbFullRow(r, String(r.user_id) === lbData.meId));
  lbFullEl.classList.add('show');
  refreshLB();
}
lbCloseEl.addEventListener('click', () => lbFullEl.classList.remove('show'));

function renderLB(rows, meId) {
  if (!rows.length) { lbEl.classList.remove('show'); return; }
  rows = rows.slice().sort((a, b) => (a.rank || 999) - (b.rank || 999));
  lbData = { rows, meId };
  lbEl.innerHTML = '';
  lbEl.appendChild(lbChampionPill(rows[0], String(rows[0].user_id) === meId));
  lbEl.classList.add('show');
  // If full overlay is open, refresh its content too
  if (lbFullEl.classList.contains('show')) {
    lblistEl.innerHTML = '';
    for (const r of rows) lblistEl.appendChild(lbFullRow(r, String(r.user_id) === meId));
  }
}

async function refreshLB() {
  const A = window.Aigram;
  if (!A || !A.canRank) return;
  try {
    const res = await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id=' + A.gameUuid, 'GET');
    const rows = Array.isArray(res) ? res : (res && res.data) || [];
    renderLB(rows, String(A.telegramId));
  } catch (e) { /* leave whatever's shown */ }
}

function submitScore(s) {
  try {
    const A = window.Aigram;
    if (!A || !A.canRank) return;
    A.callAigramAPI('/note/aigram/ai/game/rank/score/save', 'POST', {
      session_id: A.gameUuid, score: Math.round(s),
    }).catch(() => {});
  } catch (e) { /* ignore */ }
}

// HUD additions for leaderboard hook (called by gameplay on death)
const baseSetDeath = hud.setDeath;
hud.setDeath = function ({ score, best }) {
  baseSetDeath.call(hud, { score, best });
  submitScore(score);
  setTimeout(refreshLB, 1200);
};

// initial fetch on load
refreshLB();

const canvas = $('#c');
startGame({ canvas, hud });

$('#again').addEventListener('click', () => {
  // restart via the gameplay state machine
  if (window.__rr && window.__rr.gameplay) window.__rr.gameplay.reset();
});
overRankEl.addEventListener('click', openLbFull);
</script>
</body>
</html>
